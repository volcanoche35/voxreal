services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voxreal-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - voxreal-network

  postgres:
    image: postgres:16-alpine
    container_name: voxreal-postgres
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: voxreal
      POSTGRES_PASSWORD: voxreal_password
      POSTGRES_DB: voxreal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxreal -d voxreal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - voxreal-network

  redis:
    image: redis:7-alpine
    container_name: voxreal-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - voxreal-network

networks:
  voxreal-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
