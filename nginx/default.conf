upstream voxreal_app {
    server app:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # ------------------------------------------------------------------
    # Gzip compression
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # ------------------------------------------------------------------
    # Static file cache (Next.js public, _next/static, images, fonts)
    # ------------------------------------------------------------------
    location /_next/static {
        alias /app/.next/static;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    location /static {
        alias /app/public/static;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /public {
        alias /app/public;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
    }

    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|woff2?|ttf|eot|otf|css|js)$ {
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # ------------------------------------------------------------------
    # WebSocket — NextAuth session / real-time proxy
    # ------------------------------------------------------------------
    location /ws {
        proxy_pass http://voxreal_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ------------------------------------------------------------------
    # API routes — no cache
    # ------------------------------------------------------------------
    location /api {
        proxy_pass http://voxreal_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ------------------------------------------------------------------
    # Main app proxy
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://voxreal_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Mitigate clickjacking / MIME sniffing
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
}
